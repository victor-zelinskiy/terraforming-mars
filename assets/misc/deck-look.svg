<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 24" width="26" height="24">
  <defs>
    <linearGradient id="dl-card" x1="9" y1="2" x2="9" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4ecd6"/>
      <stop offset="1" stop-color="#c9bd9c"/>
    </linearGradient>
  </defs>
  <!-- back cards of the deck -->
  <rect x="4.4" y="4.2" width="11" height="15.4" rx="1.6" fill="#9a8b64" opacity="0.55"/>
  <rect x="3" y="3" width="11" height="15.4" rx="1.6" fill="#b6a67e" opacity="0.8"/>
  <!-- front card -->
  <rect x="1.6" y="1.8" width="11" height="15.4" rx="1.6" fill="url(#dl-card)" stroke="#6d5a2e" stroke-width="1"/>
  <!-- magnifier -->
  <circle cx="17.6" cy="14.2" r="5" fill="rgba(20,28,40,0.35)" stroke="#e6c169" stroke-width="1.9"/>
  <line x1="21.2" y1="17.8" x2="24" y2="20.6" stroke="#e6c169" stroke-width="2.4" stroke-linecap="round"/>
</svg>
