<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    PREMIUM COST BADGE — the MEGACREDIT tile. Deliberately shaped as the
    game's M€ icon (a gold rounded square) so the number instantly reads as
    a megacredit cost, upgraded to the physical-set language: faceted bevel,
    engraved inner rim, corner facet cuts, controlled top sheen. The cost
    number is overlaid in DOM.
  -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9e6ab"/>
      <stop offset="0.42" stop-color="#dcb668"/>
      <stop offset="0.78" stop-color="#a87f3e"/>
      <stop offset="1" stop-color="#8a6730"/>
    </linearGradient>
    <linearGradient id="bevel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff6d6" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#fff6d6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#46320f" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- dark backing plate (depth against the title plate beneath) -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="#1c1305"/>
  <!-- gold body -->
  <rect x="3" y="3" width="58" height="58" rx="11" fill="url(#g)" stroke="#543d17" stroke-width="1.2"/>
  <!-- outer bevel rim -->
  <rect x="5.5" y="5.5" width="53" height="53" rx="9" fill="none" stroke="url(#bevel)" stroke-width="1.8"/>
  <!-- engraved inner rim (the classic M€ tile inner border) -->
  <rect x="9.5" y="9.5" width="45" height="45" rx="6.5" fill="none" stroke="#6d5124" stroke-width="1.1" opacity="0.95"/>
  <rect x="11" y="11" width="42" height="42" rx="5.5" fill="none" stroke="#f6e2a8" stroke-width="0.7" opacity="0.5"/>
  <!-- corner facet cuts -->
  <path d="M3 14 L14 3 M50 3 L61 14 M61 50 L50 61 M14 61 L3 50" stroke="#7a5c28" stroke-width="0.9" opacity="0.75"/>
  <!-- controlled top sheen -->
  <path d="M6 17 Q 32 24 58 17 L 58 10 Q 47 4.5 32 4.5 Q 17 4.5 6 10 Z" fill="#ffffff" opacity="0.16"/>
  <!-- soft lower shade seats the number -->
  <path d="M9 46 Q 32 52 55 46 L 55 52 Q 44 58.5 32 58.5 Q 20 58.5 9 52 Z" fill="#3a2708" opacity="0.18"/>
</svg>
