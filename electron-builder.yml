# electron-builder — produces the UNPACKED thin-client app DIRECTORY only (`--dir`). Velopack's
# `vpk pack` then turns that directory into the installer + self-updating packages (Windows
# Setup.exe, Linux AppImage, full/delta .nupkg). electron-builder no longer builds installers or
# an update feed itself — Velopack owns delivery (electron/update.ts + the CI release workflow).
#
# Packages the THIN-CLIENT desktop shell only: the Electron main/preload/protocol
# (build/electron/) + the packaged renderer (build-desktop/) + the shared stylesheet
# (build/styles.css) + static assets (assets/**) + the velopack runtime (require()d by the main
# process at runtime). The game SERVER and DATABASE are NOT bundled — the desktop app connects to
# a server over REST + WebSocket. main.ts imports only `electron` (runtime built-in), Node
# built-ins, and `velopack`.
#
# The app:// handler (electron/protocol.ts) resolves its roots from __dirname (inside the asar at
# <app.asar>/build/electron → root <app.asar>); build-desktop/, build/styles.css and assets/ sit
# at that root, so it works packaged unchanged — INCLUDING inside Velopack's install layout
# (%LocalAppData%\<packId>\current\resources\app.asar\...), which preserves the same relative depth.
#
# Pre-req: `npm run build:desktop`. See the `pack:dir:win` / `pack:dir:linux` scripts.
# Code signing is deliberately out of scope for now (unsigned artifact; Windows SmartScreen warns).

appId: io.github.victor-zelinskiy.terraforming-mars
productName: Terraforming Mars
copyright: © Victor Zelinskiy

# The thin client ships NO server node_modules and imports no native SERVER modules, so skip the
# native-dependency rebuild step entirely (it would otherwise try to rebuild the server-only
# better-sqlite3 against Electron's ABI). velopack ships prebuilt .node binaries — no rebuild.
npmRebuild: false
nodeGypRebuild: false

# Use the ALREADY-UNPACKED Electron 43 runtime from node_modules/electron/dist instead of
# re-downloading + extracting the zip. This skips electron-builder's extract-to-.tmp → rename
# step, which on Windows fails with EPERM when a scanner/indexer briefly holds a handle on the
# freshly-extracted binaries. Same pinned version (electron@43.0.0) → identical artifact.
electronDist: node_modules/electron/dist

directories:
  output: dist-desktop
  buildResources: electron/build-resources

# Explicit allowlist — nothing implicit. All node_modules are excluded, then ONLY the velopack
# runtime closure is re-included (the desktop main require()s `velopack` at runtime; the rest of
# package.json `dependencies` are server/web-only and must NOT ship). velopack bundles EVERY
# platform's native .node in its own lib/native; @neon-rs/load is its only JS dependency.
files:
  - build/electron/**/*
  - build-desktop/**/*
  - build/styles.css
  - assets/**/*
  - package.json
  # Build identity (git head + builtAt) read by the main process (electron/cacheVersion.ts) to
  # make the immutable asset cache build-scoped — a new build wipes stale art on first launch.
  - src/genfiles/settings.json
  - '!node_modules/**/*'
  - node_modules/velopack/**/*
  - node_modules/@neon-rs/**/*
  # PKG-1 (PERFORMANCE_AUDIT.md): drop dead tooling/backup art + source maps from the artifact
  # (grep-verified 0 runtime references; maps only used by DevTools). The REAL generated icons
  # (generated/tags, generated/resources, generated/custom_tiles, …) are NOT under refs/ and stay.
  - '!assets/generated/refs/**/*'
  - '!assets/original/**/*'
  - '!assets/resources/original/**/*'
  - '!**/*.map'

asar: true
# velopack loads a native .node (velopack/lib/native/*.node) — native modules CANNOT be loaded
# from inside an asar, so unpack the whole velopack package to app.asar.unpacked/. Electron's
# require() transparently redirects the .node load to the unpacked copy.
asarUnpack:
  - '**/node_modules/velopack/**'

# No installer target — `electron-builder --dir --win` produces win-unpacked/ (exe name =
# productName "Terraforming Mars.exe"), which vpk packs.
win:
  # Premium exe icon — embedded in "Terraforming Mars.exe" (taskbar / Alt-Tab / Steam exe-icon
  # extraction). Generated by scripts/make-app-icon.cjs from the Steam capsule key art; vpk also
  # gets it via `--icon` in the release workflow.
  icon: electron/build-resources/icon.ico

linux:
  # `electron-builder --dir --linux` produces linux-unpacked/ with the `terraforming-mars`
  # executable; vpk packs it into a self-updating AppImage (vpk supplies the AppImage icon).
  executableName: terraforming-mars
