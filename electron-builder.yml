# electron-builder — Phase 6 Windows build artifact (NSIS).
#
# Packages the THIN-CLIENT desktop shell only: the Electron main/preload/protocol
# (build/electron/) + the packaged renderer (build-desktop/) + the shared stylesheet
# (build/styles.css) + static assets (assets/**). The game SERVER and DATABASE are NOT
# bundled — the desktop app connects to a server over REST + WebSocket. main.ts imports
# only `electron` (runtime built-in) + Node built-ins, so NO node_modules ship at runtime.
#
# The app:// handler (electron/protocol.ts) resolves its roots from __dirname, which
# points inside the asar at <app.asar>/build/electron → root <app.asar>; build-desktop/,
# build/styles.css and assets/ sit at that root, so it works packaged with no change.
#
# Pre-req: `npm run build:desktop` (make:static + DESKTOP_BUILD=1 build:client +
# electron:build:main). See the `dist:win` / `electron:pack:dir` scripts.
# Signing is deliberately out of scope (Phase 6 = unsigned dev artifact).

appId: io.github.victor-zelinskiy.terraforming-mars
productName: Terraforming Mars
copyright: © Victor Zelinskiy

# The thin client ships NO node_modules and imports no native modules, so skip the
# native-dependency rebuild step entirely (it would otherwise try to rebuild the
# server-only better-sqlite3 against Electron's ABI).
npmRebuild: false
nodeGypRebuild: false

# Use the ALREADY-UNPACKED Electron 43 runtime from node_modules/electron/dist instead
# of re-downloading + extracting the zip. This skips electron-builder's
# extract-to-.tmp → rename step, which on Windows fails with
#   EPERM: operation not permitted, rename 'win-unpacked.tmp' -> 'win-unpacked'
# when a scanner/indexer (Defender, Controlled Folder Access, an editor file-watcher,
# OneDrive, …) briefly holds a handle on the freshly-extracted binaries. Same version
# (pinned electron@43.0.0), so the artifact is identical — just built reliably.
electronDist: node_modules/electron/dist

directories:
  output: dist-desktop
  buildResources: electron/build-resources

# Explicit allowlist — nothing implicit. All node_modules are excluded, then ONLY
# electron-updater's runtime dependency closure is re-included (the desktop main
# require()s electron-updater at runtime; the rest of package.json `dependencies`
# are server/web-only and must NOT ship). Closure computed from electron-updater@6.8.9.
files:
  - build/electron/**/*
  - build-desktop/**/*
  - build/styles.css
  - assets/**/*
  - package.json
  - '!node_modules/**/*'
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
  - node_modules/fs-extra/**/*
  - node_modules/graceful-fs/**/*
  - node_modules/jsonfile/**/*
  - node_modules/universalify/**/*
  - node_modules/js-yaml/**/*
  - node_modules/argparse/**/*
  - node_modules/lazy-val/**/*
  - node_modules/lodash.escaperegexp/**/*
  - node_modules/lodash.isequal/**/*
  - node_modules/semver/**/*
  - node_modules/tiny-typed-emitter/**/*
  - node_modules/debug/**/*
  - node_modules/ms/**/*
  - node_modules/sax/**/*
  # PKG-1 (PERFORMANCE_AUDIT.md): drop dead tooling/backup art + source maps from the
  # installer (grep-verified 0 runtime references; maps only used by DevTools). Shrinks
  # the artifact by ~120 MB. The REAL generated icons (generated/tags, generated/resources,
  # generated/custom_tiles, …) are NOT under refs/ and stay bundled.
  - '!assets/generated/refs/**/*'
  - '!assets/original/**/*'
  - '!assets/resources/original/**/*'
  - '!**/*.map'

asar: true

win:
  target:
    - nsis
  # No custom icon in Phase 6 → the default Electron icon is used (a polish item).

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: TerraformingMars-Setup-${version}-${arch}.${ext}

# Linux / Steam Deck (SteamOS) — x64 AppImage. electron-builder emits the AppImage +
# latest-linux.yml (+ .blockmap) so electron-updater's Linux feed works exactly like the
# Windows one. Steam Deck: download the AppImage, `chmod +x`, run, add as a Non-Steam Game.
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Game
  executableName: terraforming-mars
  # Committed icon (web favicon upscaled to 512²) so the AppImage + generated .desktop
  # entry are branded. Windows is unaffected: buildResources has no icon.png, so this
  # linux-only file only applies to the AppImage.
  icon: electron/build-resources/linuxIcon.png
  artifactName: TerraformingMars-${version}-${arch}.${ext}

artifactName: TerraformingMars-${version}-${os}-${arch}.${ext}

# Update-delivery feed (Phase 7). electron-builder bakes this into the app's
# app-update.yml (read by electron-updater at runtime) and emits latest.yml + .blockmap.
#
# Feed = GitHub Releases under the personal account victor-zelinskiy. electron-builder's
# `--publish always` (the CI release job / `dist:win:publish`) uploads the installer .exe,
# latest.yml and .blockmap to the release for the pushed tag; electron-updater then reads
# https://github.com/victor-zelinskiy/terraforming-mars/releases for updates. Requires a
# GH_TOKEN in CI (GitHub Actions injects secrets.GITHUB_TOKEN automatically).
#
# The COMPATIBILITY GATE (GET /api/desktop/version on the server) is independent of this
# feed; if the feed is ever unreachable, auto-download degrades to the manual-download
# fallback (the server's TM_DESKTOP_DOWNLOAD_URL).
publish:
  provider: github
  owner: victor-zelinskiy
  repo: terraforming-mars
  # DRAFT + explicit publish: electron-builder creates the release as a DRAFT and uploads
  # every asset to it. The draft code path is retry-safe and avoids the 422 "already_exists"
  # race that `release` hits when the large (~300 MB) installer upload retries mid-publish.
  # The workflow's final "Publish the release" step then flips the draft to published, so
  # the end result is a normal published release with the installer + latest.yml attached.
  releaseType: draft
