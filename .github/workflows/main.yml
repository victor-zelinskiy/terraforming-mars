name: CI

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same ref cancels the in-flight CI run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: npm
    - run: npm ci
    - run: npm run make:static
    - run: npm run lint
    - run: npm run build
    - run: npm run build:tests
    - run: npm test

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: npm
    - run: npm ci
    - run: npm run make:static
    # No lint here — eslint / vue-tsc / i18n audit are OS-independent and already
    # run on build-linux. Windows only verifies the build + test compilation, to
    # catch Windows-specific path / build issues without doubling CI time.
    - run: npm run build
    - run: npm run build:tests

  build-docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max


