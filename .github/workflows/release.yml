# Electron desktop release — builds Windows + Linux and publishes ONE GitHub Release under
# victor-zelinskiy/terraforming-mars. The source repo is PUBLIC, so the workflow's built-in
# GITHUB_TOKEN creates the release AND electron-updater reads it with no embedded token.
# No separate releases repo / cross-repo PAT is used.
#
# Trigger: pushing a version tag (e.g. `v1.0.5`). Regular branch pushes do NOT publish
# (that's the CI workflow in main.yml). Bump package.json "version" to match the tag first.
#
# WHY build-then-assemble (not `electron-builder --publish` per job): two electron-builder
# jobs each create their OWN draft release for the same tag, so the installer and the
# AppImage land in DIFFERENT drafts. Instead each platform BUILDS ONLY (`--publish never`),
# uploads its dist-desktop output as a workflow artifact, and a single `release` job
# assembles ONE published release from all artifacts — deterministic, no cross-job race.
#
# Per platform (targets in electron-builder.yml):
#   - Windows (windows-latest) → NSIS .exe + latest.yml        (electron-updater WIN feed)
#   - Linux   (ubuntu-latest)  → x64 AppImage + latest-linux.yml (electron-updater LINUX feed)
# Steam Deck / SteamOS users download the x64 AppImage, `chmod +x`, run it, and add it to
# Steam as a Non-Steam Game.

name: Release Electron App

on:
  push:
    tags:
      - 'v*'

# Required so `gh release create` can create the Release + upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            script: dist:win
          - os: ubuntu-latest
            platform: linux
            script: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron@43.0.0 in this tree ships without a postinstall hook, so `npm ci` does NOT
      # populate node_modules/electron/dist — which electron-builder.yml points at via
      # `electronDist`. Run Electron's own installer to unpack the (platform-appropriate)
      # runtime before packaging, else electron-builder fails with "electronDist does not exist".
      - name: Unpack Electron runtime
        run: node node_modules/electron/install.js

      # Build ONLY (no publish): electron-builder emits the installer / AppImage + latest*.yml
      # (+ blockmaps) into dist-desktop/. The `release` job uploads them all together.
      - name: Build (${{ matrix.platform }})
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist-desktop/*.exe
            dist-desktop/*.AppImage
            dist-desktop/*.blockmap
            dist-desktop/latest*.yml
          retention-days: 3
          if-no-files-found: error

  # Assemble ONE published release from both platforms' artifacts.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - name: Publish GitHub Release
        run: >
          gh release create "${{ github.ref_name }}" dist/*
          --repo "${{ github.repository }}"
          --title "Terraforming Mars ${{ github.ref_name }}"
          --notes "Desktop release ${{ github.ref_name }} — Windows installer (.exe) + Linux x64 AppImage. Steam Deck: download the AppImage, chmod +x, run it, add it to Steam as a Non-Steam Game."
          --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
