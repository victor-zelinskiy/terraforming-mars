# Electron desktop release — builds Windows + Linux and publishes ONE GitHub Release under
# victor-zelinskiy/terraforming-mars on EVERY push to main. The repo is public, so the
# built-in GITHUB_TOKEN creates the release and electron-updater reads it with no token.
#
# Versioning: each run gets 1.1.<github.run_number> — run_number is unique and monotonically
# increasing per workflow, and 1.1.x is always above the older 1.0.x line, so electron-updater
# always treats a fresh build as newer. The version is set ONLY for the build (not committed).
#
# Old releases are pruned to the newest 3 (older releases + their tags are deleted).
#
# Per platform (electron-builder.yml): Windows → NSIS .exe + latest.yml; Linux → x64 AppImage
# + latest-linux.yml (+ blockmaps). Each platform builds ONLY (--publish never) and uploads a
# workflow artifact; a single `release` job assembles ONE published release — no cross-job race.
# Steam Deck: download the AppImage, chmod +x, run, add as a Non-Steam Game.

name: Release Electron App

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

# Coalesce bursts: a newer push cancels an in-flight build so only the LATEST commit is
# released (you always want the newest on the Deck; saves CI when pushing several commits).
concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            script: dist:win
          - os: ubuntu-latest
            platform: linux
            script: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron@43.0.0 ships without a postinstall hook, so `npm ci` doesn't populate
      # node_modules/electron/dist (electron-builder's electronDist). Unpack it explicitly.
      - name: Unpack Electron runtime
        run: node node_modules/electron/install.js

      # Unique, monotonic version per push so electron-updater always sees a newer build.
      # Not committed — set only for this build's artifacts / latest*.yml.
      - name: Set release version
        run: npm version "1.1.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Build (${{ matrix.platform }})
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist-desktop/*.exe
            dist-desktop/*.AppImage
            dist-desktop/*.blockmap
            dist-desktop/latest*.yml
          retention-days: 3
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - name: Publish GitHub Release
        run: >
          gh release create "v1.1.${{ github.run_number }}" dist/*
          --repo "${{ github.repository }}"
          --target "${{ github.sha }}"
          --title "Terraforming Mars v1.1.${{ github.run_number }}"
          --notes "Automated desktop build from ${{ github.sha }} — Windows installer (.exe) + Linux x64 AppImage. Steam Deck: download the AppImage, chmod +x, run it, add it to Steam as a Non-Steam Game."
          --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Keep only the newest 3 releases; delete older releases AND their tags.
      - name: Prune old releases (keep newest 3)
        run: |
          gh api "repos/${{ github.repository }}/releases?per_page=100" \
            --jq 'sort_by(.created_at) | reverse | .[3:] | .[].tag_name' \
          | while read -r tag; do
              [ -n "$tag" ] || continue
              echo "pruning old release $tag"
              gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag || true
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
